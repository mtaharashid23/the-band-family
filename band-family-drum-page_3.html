<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Friends Story</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Patrick+Hand&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f6e5d6;
      overflow: hidden;
      font-family: 'Patrick Hand', cursive;
      padding: 20px;
    }

    .book-page {
      position: relative;
      width: min(92vw, 900px);
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 18px;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.18),
        inset 0 0 40px rgba(255, 255, 255, 0.15);
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .story-text {
      position: absolute;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      width: 82%;
      text-align: center;
      z-index: 20;

      font-family: Georgia, serif;
      font-weight: 700;
      line-height: 1.28;
      color: #1e120d;

      font-size: clamp(20px, 3vw, 42px);

      cursor: pointer;
    }

    .story-text span {
      display: inline-block;
      transition: 0.3s ease;
    }

    .story-text:hover span {
      transform: translateY(-2px);
    }


    /* GUITAR - Adjusted Position */
    .guitar {
      position: absolute;
      bottom: 29%;
      left: 21%;
      z-index: 10;
      cursor: pointer;
      transition: transform 0.25s ease;
      user-select: none;
      -webkit-user-drag: none;
      width: 140px;
    }

    /* TRUMPET - Adjusted Position */
    .trumpet {
      position: absolute;
      bottom: 36%;
      left: 40%;
      width: 10%;
      z-index: 11;
      cursor: pointer;
      transition: transform 0.25s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* PIANO - Adjusted Position */
    .piano {
      position: absolute;
      bottom: 28%;
      left: 70%;
      transform: translateX(-50%);
      width: 32%;
      z-index: 10;
      cursor: pointer;
      transition: transform 0.25s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .guitar:hover {
      transform: scale(1.05) rotate(-3deg);
    }

    .piano:hover {
      transform: translateX(-50%) scale(1.03);
    }

    .trumpet:hover {
      transform: scale(1.08);
    }

    .guitar.playing {
      animation: guitarDance 0.8s ease;
    }

    .piano.playing {
      animation: pianoDance 0.8s ease;
    }

    .trumpet.playing {
      animation: trumpetDance 0.8s ease;
    }

    @keyframes guitarDance {

      0%,
      100% {
        transform: rotate(0deg);
      }

      20% {
        transform: rotate(-10deg);
      }

      40% {
        transform: rotate(8deg);
      }

      60% {
        transform: rotate(-6deg);
      }

      80% {
        transform: rotate(4deg);
      }
    }

    @keyframes pianoDance {

      0%,
      100% {
        transform: translateX(-50%) rotate(0deg);
      }

      25% {
        transform: translateX(-50%) rotate(-4deg);
      }

      50% {
        transform: translateX(-50%) rotate(4deg);
      }

      75% {
        transform: translateX(-50%) rotate(-2deg);
      }
    }

    @keyframes trumpetDance {

      0%,
      100% {
        transform: scale(1) translateY(0);
      }

      25% {
        transform: scale(1.1) translateY(-10px);
      }

      50% {
        transform: scale(1) translateY(0);
      }

      75% {
        transform: scale(1.05) translateY(-5px);
      }
    }

    .music-notes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .note {
      position: absolute;
      font-size: clamp(24px, 3vw, 42px);
      animation: floatNote 1.8s linear forwards;
      opacity: 0;
    }

    @keyframes floatNote {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5) rotate(0deg);
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-160px) scale(1.2) rotate(25deg);
      }
    }

    .crowd-btn {
      position: absolute;
      bottom: 2%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;

      padding: 12px 30px;
      font-size: clamp(14px, 2vw, 22px);
      font-family: 'Patrick Hand', cursive;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b9d, #ff4fa0);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 15px rgba(255, 75, 160, 0.3);
      user-select: none;
    }

    .crowd-btn:hover {
      box-shadow: 0 6px 20px rgba(255, 75, 160, 0.5);
    }

    .crowd-btn:active {}

    .hint {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;

      color: rgba(0, 0, 0, 0.45);
      font-size: clamp(12px, 1.5vw, 18px);

      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    @media(max-width:768px) {

      .guitar {
        width: 20%;
        left: 15%;
        bottom: 20%;
      }

      .trumpet {
        width: 12%;
        left: 40%;
        bottom: 28%;
      }

      .piano {
        width: 38%;
        left: 70%;
        bottom: 18%;
      }

      .story-text {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="book-page">

    <img class="background" src="page_3.png" alt="background">

    <div class="story-text" id="storyText">
      <span>The Band Family of three</span><br>
      <span>played on many stages, big and</span><br>
      <span>small. People clapped and</span><br>
      <span>cheered.</span>
    </div>

    <img src="guitar.png" class="guitar" id="guitar" alt="guitar">

    <img src="trumpet.png" class="trumpet" id="trumpet" alt="trumpet">

    <img src="piano.png" class="piano" id="piano" alt="piano">

    <div class="music-notes" id="musicNotes"></div>

    <div class="hint">
      🎵 Hover text • Click instruments 🎵
    </div>

    <button class="crowd-btn" id="crowdBtn">Crowd</button>

  </div>

  <!-- AUDIO FILES -->
  <audio id="guitarAudio" preload="auto">
    <source src="band-page.mp3" type="audio/mpeg">
  </audio>

  <audio id="trumpetAudio" preload="auto">
    <source src="band-page.mp3" type="audio/mpeg">
  </audio>

  <audio id="pianoAudio" preload="auto">
    <source src="band-page.mp3" type="audio/mpeg">
  </audio>

  <!-- STORY NARRATION AUDIO -->
  <audio id="storyAudio" preload="auto">
    <source src="page_3.mp3" type="audio/mpeg">
  </audio>

  <!-- CROWD AUDIO -->
  <audio id="crowdAudio" preload="auto">
    <source src="crowd.mp3" type="audio/mpeg">
  </audio>

  <script>
    const guitar = document.getElementById("guitar");
    const piano = document.getElementById("piano");
    const trumpet = document.getElementById("trumpet");

    const guitarAudio = document.getElementById("guitarAudio");
    const pianoAudio = document.getElementById("pianoAudio");
    const trumpetAudio = document.getElementById("trumpetAudio");
    const storyAudio = document.getElementById("storyAudio");

    const musicNotes = document.getElementById("musicNotes");
    const storyText = document.getElementById("storyText");
    const crowdBtn = document.getElementById("crowdBtn");
    const crowdAudio = document.getElementById("crowdAudio");

    function createNotes(x, y) {

      const symbols = ["♪", "♫", "", "♩", "✨"];

      for (let i = 0; i < 8; i++) {

        const note = document.createElement("div");

        note.className = "note";

        note.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

        note.style.left = (x + (Math.random() * 100 - 50)) + "px";

        note.style.top = (y + (Math.random() * 50 - 25)) + "px";

        note.style.color = [
          "#ff4fa0",
          "#9b59ff",
          "#ffae00",
          "#00bfff",
          "#ff6b6b"
        ][Math.floor(Math.random() * 5)];

        musicNotes.appendChild(note);

        setTimeout(() => {
          note.remove();
        }, 1800);
      }
    }

    guitar.addEventListener("click", (e) => {

      guitarAudio.currentTime = 0;
      guitarAudio.play();

      guitar.classList.add("playing");

      createNotes(e.pageX, e.pageY);

      setTimeout(() => {
        guitar.classList.remove("playing");
      }, 800);

    });

    trumpet.addEventListener("click", (e) => {

      trumpetAudio.currentTime = 0;
      trumpetAudio.play();

      trumpet.classList.add("playing");

      createNotes(e.pageX, e.pageY);

      setTimeout(() => {
        trumpet.classList.remove("playing");
      }, 800);

    });

    piano.addEventListener("click", (e) => {

      pianoAudio.currentTime = 0;
      pianoAudio.play();

      piano.classList.add("playing");

      createNotes(e.pageX, e.pageY);

      setTimeout(() => {
        piano.classList.remove("playing");
      }, 800);

    });

    /* PLAY STORY AUDIO */
    function playStory() {

      // Stop any currently playing audio
      storyAudio.pause();
      storyAudio.currentTime = 0;

      // Play the story narration audio file
      storyAudio.play();
    }

    /* HOVER TO PLAY STORY */
    storyText.addEventListener("mouseenter", playStory);

    /* CLICK TO PLAY STORY (for mobile) */
    storyText.addEventListener("click", playStory);

    /* Reset audio when it ends */
    storyAudio.addEventListener('ended', function () {
      storyAudio.currentTime = 0;
    });

    /* CROWD BUTTON CLICK */
    crowdBtn.addEventListener("click", () => {
      crowdAudio.currentTime = 0;
      crowdAudio.play();
    });
  </script>

</body>

</html>
