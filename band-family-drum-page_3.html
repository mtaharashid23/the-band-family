<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Band Family - Interactive Page</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Patrick+Hand&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5e6d3;
      font-family: 'Patrick Hand', cursive;
      overflow: hidden;
    }

    .book-page {
      position: relative;
      width: min(90vw, 600px);
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.2),
        0 2px 8px rgba(0, 0, 0, 0.1),
        inset 0 0 60px rgba(255, 255, 255, 0.1);
    }

    .background {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .drum-character {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 42%;
      cursor: pointer;
      transition: filter 0.2s;
      z-index: 2;
      -webkit-user-select: none;
      user-select: none;
    }

    .drum-character:hover {
      filter: brightness(1.08) drop-shadow(0 4px 12px rgba(255, 150, 180, 0.5));
    }

    .drum-character:active {
      transform: translateX(-50%) scale(0.95);
    }

    /* Dance animations */
    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0) rotate(0deg);
      }

      15% {
        transform: translateX(-50%) translateY(-25px) rotate(-8deg);
      }

      30% {
        transform: translateX(-50%) translateY(0) rotate(5deg);
      }

      45% {
        transform: translateX(-50%) translateY(-15px) rotate(-5deg);
      }

      60% {
        transform: translateX(-50%) translateY(0) rotate(3deg);
      }

      75% {
        transform: translateX(-50%) translateY(-8px) rotate(-2deg);
      }

      90% {
        transform: translateX(-50%) translateY(0) rotate(0deg);
      }
    }

    @keyframes wiggle {

      0%,
      100% {
        transform: translateX(-50%) rotate(0deg) scale(1);
      }

      10% {
        transform: translateX(-50%) rotate(-12deg) scale(1.05);
      }

      20% {
        transform: translateX(-50%) rotate(12deg) scale(1.05);
      }

      30% {
        transform: translateX(-50%) rotate(-10deg) scale(1.03);
      }

      40% {
        transform: translateX(-50%) rotate(10deg) scale(1.03);
      }

      50% {
        transform: translateX(-50%) rotate(-6deg) scale(1.02);
      }

      60% {
        transform: translateX(-50%) rotate(6deg) scale(1.02);
      }

      70% {
        transform: translateX(-50%) rotate(-3deg) scale(1.01);
      }

      80% {
        transform: translateX(-50%) rotate(3deg) scale(1);
      }
    }

    .dancing {
      animation: bounce 0.9s ease-in-out, wiggle 0.9s ease-in-out;
    }

    /* Tap Tap label */
    .tap-label {
      position: absolute;
      bottom: 62%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      background: rgba(255, 255, 255, 0.92);
      padding: 6px 20px;
      border-radius: 24px;
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(18px, 4vw, 28px);
      color: #e84393;
      letter-spacing: 2px;
      box-shadow: 0 3px 12px rgba(232, 67, 147, 0.2);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tap-label.visible {
      opacity: 1;
      animation: floatUp 1s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }

      30% {
        opacity: 1;
        transform: translateX(-50%) translateY(-5px);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-30px);
      }
    }

    /* Musical notes */
    .music-notes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
    }

    .note {
      position: absolute;
      font-size: clamp(20px, 5vw, 36px);
      opacity: 0;
      color: #e84393;
    }

    @keyframes noteFloat {
      0% {
        opacity: 0;
        transform: translateY(0) rotate(0deg) scale(0.5);
      }

      20% {
        opacity: 1;
        transform: translateY(-30px) rotate(-15deg) scale(1);
      }

      80% {
        opacity: 0.6;
        transform: translateY(-120px) rotate(20deg) scale(0.9);
      }

      100% {
        opacity: 0;
        transform: translateY(-180px) rotate(-10deg) scale(0.5);
      }
    }

    /* Story text */
    .story-text {
      position: absolute;
      top: 4%;
      left: 8%;
      right: 8%;
      text-align: center;
      z-index: 5;
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(14px, 3.5vw, 24px);
      font-weight: 500;
      color: #2d3436;
      line-height: 1.4;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.7);
    }

    /* Click hint */
    .click-hint {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Patrick Hand', cursive;
      font-size: clamp(11px, 2.5vw, 16px);
      color: rgba(100, 100, 100, 0.6);
      z-index: 5;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.8;
      }
    }

    /* Page border decoration */
    .book-page::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 3px solid rgba(200, 180, 160, 0.3);
      border-radius: 12px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div class="book-page" id="bookPage">
    <img class="background"
      src="page_3.png"
      alt="Music room background" />

    <h4 class="story-text">
      Drum &#8220;tap tap&#8221; loved music too.<br>
      At music school, Drum &#8220;tap tap&#8221;<br>
      practiced every day.
    </h4>

    <div class="tap-label" id="tapLabel">Tap Tap</div>
    
    <img class="drum-character" id="drumChar" src="drum.png" alt="Drum character - click to play!" draggable="false" />

    <div class="music-notes" id="musicNotes"></div>

    <h5 class="click-hint">&#9834; tap the drum to play! &#9834;</h5>
  </div>

  <script>
    const drumChar = document.getElementById('drumChar');
    const drumSound = document.getElementById('drumSound');
    const tapLabel = document.getElementById('tapLabel');
    const musicNotes = document.getElementById('musicNotes');
    let isAnimating = false;

    const noteSymbols = ['\u266A', '\u266B', '\u266C', '\u2669', '\u2728'];

    function spawnNotes() {
      for (let i = 0; i < 6; i++) {
        setTimeout(() => {
          const note = document.createElement('span');
          note.className = 'note';
          note.textContent = noteSymbols[Math.floor(Math.random() * noteSymbols.length)];
          note.style.left = (30 + Math.random() * 40) + '%';
          note.style.top = (35 + Math.random() * 20) + '%';
          note.style.color = ['#e84393', '#fd79a8', '#a29bfe', '#74b9ff', '#ffeaa7'][Math.floor(Math.random() * 5)];
          note.style.animation = `noteFloat ${0.8 + Math.random() * 0.6}s ease-out forwards`;
          note.style.animationDelay = `${i * 0.1}s`;
          musicNotes.appendChild(note);
          setTimeout(() => note.remove(), 1500);
        }, i * 80);
      }
    }

    function playDrum() {
      if (isAnimating) return;
      isAnimating = true;

      // Play sound
      drumSound.currentTime = 0;
      drumSound.play().catch(() => {});

      // Dance animation
      drumChar.classList.add('dancing');

      // Show tap label
      tapLabel.classList.remove('visible');
      void tapLabel.offsetWidth;
      tapLabel.classList.add('visible');

      // Spawn musical notes
      spawnNotes();

      // Hide click hint after first interaction
      const hint = document.querySelector('.click-hint');
      if (hint) hint.style.opacity = '0';

      // Clean up
      setTimeout(() => {
        drumChar.classList.remove('dancing');
        isAnimating = false;
      }, 950);
    }

    drumChar.addEventListener('click', playDrum);
    drumChar.addEventListener('touchstart', (e) => {
      e.preventDefault();
      playDrum();
    });
  </script>
