<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Friends Story</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Patrick+Hand&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f6e5d6;
      overflow: hidden;
      font-family: 'Patrick Hand', cursive;
      padding: 20px;
    }

    .book-page {
      position: relative;
      width: min(92vw, 900px);
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 18px;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.18),
        inset 0 0 40px rgba(255, 255, 255, 0.15);
    }

    /* KEEP YOUR ORIGINAL BACKGROUND */
    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* TEXT */
    .story-text {
      position: absolute;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      text-align: center;
      z-index: 20;

      font-family: Georgia, serif;
      font-weight: 700;
      line-height: 1.25;
      color: #1e120d;

      font-size: clamp(18px, 3vw, 42px);

      cursor: pointer;
    }

    .story-text span {
      display: inline-block;
      transition: 0.3s ease;
    }

    .story-text:hover span {
      transform: translateY(-2px);
    }

     /* GUITAR */
    .guitar {
      position: absolute;
      bottom: 24%;
      left: 18%;
      width: 14%;
      z-index: 10;
      cursor: pointer;
      transition: transform 0.25s ease;
      user-select: none;
      -webkit-user-drag: none;
      transform: rotate(-8deg);
    }

    /* PIANO */
    .piano {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 30%;
      z-index: 10;
      cursor: pointer;
      transition: transform 0.25s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .guitar:hover {
      transform: scale(1.05) rotate(-3deg);
    }

    .piano:hover {
      transform: translateX(-50%) scale(1.03);
    }

    /* ANIMATION */
    .guitar.playing {
      animation: guitarDance 0.8s ease;
    }

    .piano.playing {
      animation: pianoDance 0.8s ease;
    }

    @keyframes guitarDance {

      0%,
      100% {
        transform: rotate(0deg);
      }

      20% {
        transform: rotate(-10deg);
      }

      40% {
        transform: rotate(8deg);
      }

      60% {
        transform: rotate(-6deg);
      }

      80% {
        transform: rotate(4deg);
      }
    }

    @keyframes pianoDance {

      0%,
      100% {
        transform: translateX(-50%) rotate(0deg);
      }

      25% {
        transform: translateX(-50%) rotate(-4deg);
      }

      50% {
        transform: translateX(-50%) rotate(4deg);
      }

      75% {
        transform: translateX(-50%) rotate(-2deg);
      }
    }

    /* MUSIC NOTES */
    .music-notes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .note {
      position: absolute;
      font-size: clamp(24px, 3vw, 42px);
      animation: floatNote 1.8s linear forwards;
      opacity: 0;
    }

    @keyframes floatNote {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5) rotate(0deg);
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-160px) scale(1.2) rotate(25deg);
      }
    }

    .hint {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;

      color: rgba(0, 0, 0, 0.45);
      font-size: clamp(12px, 1.5vw, 18px);

      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    @media(max-width:768px) {

      .guitar {
        width: 18%;
        left: 20%;
        bottom: 20%;
      }

      .piano {
        width: 45%;
        bottom: 18%;
      }

      .story-text {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="book-page">

    <!-- YOUR ORIGINAL BACKGROUND -->
    <img class="background" src="page_1.png" alt="background">

    <!-- STORY TEXT -->
    <div class="story-text" id="storyText">
      <span>In a cozy coffee shop,</span><br>
      <span>Piano “plink plink” and</span><br>
      <span>Guitar “pluck pluck”</span><br>
      <span>loved making music together.</span>
    </div>

    <!-- GUITAR -->
    <img src="guitar.png" class="guitar" id="guitar" alt="guitar">

    <!-- PIANO -->
    <img src="piano.png" class="piano" id="piano" alt="piano">

    <!-- FLOATING NOTES -->
    <div class="music-notes" id="musicNotes"></div>

    <div class="hint">
      🎵 Hover text • Click instruments 🎵
    </div>

  </div>

  <!-- AUDIO -->
  <!-- GUITAR AUDIO -->
  <audio id="guitarAudio" preload="auto">
    <source src="guitar.mp3" type="audio/mpeg">
  </audio>

  <!-- PIANO AUDIO -->
  <audio id="pianoAudio" preload="auto">
    <source src="piano.mp3" type="audio/mpeg">
  </audio>

  <!-- STORY NARRATION AUDIO -->
  <audio id="storyAudio" preload="auto">
    <source src="page_1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const guitar = document.getElementById("guitar");
    const piano = document.getElementById("piano");
    

    const guitarAudio = document.getElementById("guitarAudio");
    const pianoAudio = document.getElementById("pianoAudio");
    const storyAudio = document.getElementById("storyAudio");

    const musicNotes = document.getElementById("musicNotes");
    const storyText = document.getElementById("storyText");

    /* FLOATING NOTES */
    function createNotes(x, y) {

      const symbols = ["♪", "♫", "♬", "♩", "✨"];

      for (let i = 0; i < 8; i++) {

        const note = document.createElement("div");

        note.className = "note";

        note.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

        note.style.left = (x + (Math.random() * 100 - 50)) + "px";

        note.style.top = (y + (Math.random() * 50 - 25)) + "px";

        note.style.color = [
          "#ff4fa0",
          "#9b59ff",
          "#ffae00",
          "#00bfff",
          "#ff6b6b"
        ][Math.floor(Math.random() * 5)];

        musicNotes.appendChild(note);

        setTimeout(() => {
          note.remove();
        }, 1800);
      }
    }

    /* GUITAR CLICK */
    guitar.addEventListener("click", (e) => {

      guitarAudio.currentTime = 0;
      guitarAudio.play();

      guitar.classList.add("playing");

      createNotes(e.pageX, e.pageY);

      setTimeout(() => {
        guitar.classList.remove("playing");
      }, 800);

    });

    /* PIANO CLICK */
    piano.addEventListener("click", (e) => {

      pianoAudio.currentTime = 0;
      pianoAudio.play();

      piano.classList.add("playing");

      createNotes(e.pageX, e.pageY);

      setTimeout(() => {
        piano.classList.remove("playing");
      }, 800);

    });

    /* PLAY STORY AUDIO */
    function playStory() {

      // Stop any currently playing audio
      storyAudio.pause();
      storyAudio.currentTime = 0;

      // Play the story narration audio file
      storyAudio.play();
    }

    /* HOVER TO PLAY STORY */
    storyText.addEventListener("mouseenter", playStory);

    /* CLICK TO PLAY STORY (for mobile) */
    storyText.addEventListener("click", playStory);

    /* Reset audio when it ends */
    storyAudio.addEventListener('ended', function () {
      storyAudio.currentTime = 0;
    });
  </script>

</body>

</html>
